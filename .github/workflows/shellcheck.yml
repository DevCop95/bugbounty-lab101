name: Security and Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          echo "=== ShellCheck Analysis ==="
          ERRORS=0
          while IFS= read -r -d '' script; do
            echo "Checking: $script"
            if ! shellcheck -x -S warning "$script"; then
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" -print0)

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "ShellCheck found issues in $ERRORS file(s)."
            exit 1
          else
            echo ""
            echo "All scripts passed ShellCheck."
          fi

      - name: Syntax check
        run: |
          echo "=== Bash Syntax Check ==="
          find . -name "*.sh" -not -path "./.git/*" -exec bash -n {} \;
          echo "All scripts have valid syntax."

      - name: Python compile and tests
        run: |
          python3 -m compileall -q scripts auto-scanner/burp-integration tests
          python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Functional shell tests
        run: bash tests/test-shell-scope.sh

      - name: Reject tracked raw evidence
        run: bash scripts/check-sensitive-files.sh
